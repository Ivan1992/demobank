<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talys Event Log — DemoBank</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--bg); padding: 32px 24px; }

    .page-header {
      max-width: 1200px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 2px; }

    .log-card {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .log-table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--sidebar-bg);
      color: rgba(255,255,255,0.55);
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,168,142,0.05); }
    td { padding: 10px 14px; vertical-align: top; color: var(--text); }

    .td-date  { white-space: nowrap; color: var(--text-muted); font-size: 12px; min-width: 140px; }
    .td-type  { white-space: nowrap; }
    .td-body  { max-width: 600px; }
    .td-status { text-align: center; }

    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      color: rgba(255,255,255,0.7);
      max-height: 160px;
      overflow-y: auto;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .badge-ok   { background: rgba(0,168,142,0.2);   color: #3de8ca; }
    .badge-warn { background: rgba(255,190,100,0.2);  color: #ffbe64; }
    .badge-err  { background: rgba(255,51,85,0.2);   color: #ff6680; }
    .badge-null { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }

    .event-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(0,168,142,0.15);
      color: var(--accent);
    }

    .empty-log {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-log .icon { font-size: 40px; margin-bottom: 12px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .row-count { font-size: 13px; color: var(--text-muted); margin-left: auto; }
  </style>
  <style>
    body.light-theme .code-block { color: rgba(29,54,83,0.8); background: #f4f7fa; }
    body.light-theme tbody tr:hover { background: rgba(0,168,142,0.04); }
    body.light-theme .badge-ok   { background: rgba(0,168,142,0.12);  color: #007a69; }
    body.light-theme .badge-warn { background: rgba(180,120,0,0.12);  color: #8a6000; }
    body.light-theme .badge-err  { background: rgba(255,51,85,0.10);  color: #cc1f3f; }
    body.light-theme .badge-null { background: rgba(29,54,83,0.08);   color: rgba(29,54,83,0.5); }
    body.light-theme .event-tag  { background: rgba(0,168,142,0.1);   color: #007a69; }
  </style>
</head>
<body>
<script>if(localStorage.getItem('db_theme')==='light')document.body.classList.add('light-theme');</script>

<div class="page-header">
  <div>
    <h1>Talys Event Log</h1>
    <p>Журнал запросов к транзакционному антифроду</p>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn btn-outline" onclick="loadLog()">↺ Обновить</button>
    <button class="btn-theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>
    <a href="/kfp-log.html" class="btn btn-secondary">🛡️ KFP Log</a>
    <a href="/dashboard.html" class="btn btn-secondary">← Dashboard</a>
  </div>
</div>

<div class="log-card">
  <div class="toolbar">
    <span style="font-size:13px; font-weight:600;">Последние 200 событий</span>
    <span class="row-count" id="rowCount"></span>
  </div>
  <div class="log-table-wrap">
    <div id="logContent">
      <div class="empty-log"><div class="icon">⏳</div>Загрузка…</div>
    </div>
  </div>
</div>

<script>
  function formatDate(dt) {
    if (!dt) return '—';
    const d = new Date(dt.replace(' ', 'T') + 'Z');
    return d.toLocaleString('ru-RU', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  function statusBadge(status) {
    if (status == null) return '<span class="badge badge-null">—</span>';
    const s = Number(status);
    const cls = s >= 200 && s < 300 ? 'badge-ok' : s >= 400 && s < 500 ? 'badge-warn' : 'badge-err';
    return `<span class="badge ${cls}">${status}</span>`;
  }

  function prettyJson(raw) {
    if (!raw) return '<span style="color:var(--text-muted)">—</span>';
    try {
      return `<div class="code-block">${JSON.stringify(JSON.parse(raw), null, 2)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
    } catch {
      return `<div class="code-block">${raw.replace(/&/g, '&amp;').replace(/</g, '&lt;')}</div>`;
    }
  }

  async function loadLog() {
    document.getElementById('logContent').innerHTML =
      '<div class="empty-log"><div class="icon">⏳</div>Загрузка…</div>';
    document.getElementById('rowCount').textContent = '';

    try {
      const res = await fetch('/api/talys-log');
      const rows = await res.json();

      if (!rows.length) {
        document.getElementById('logContent').innerHTML =
          '<div class="empty-log"><div class="icon">📭</div>Событий пока нет. Выполните вход или операцию.</div>';
        document.getElementById('rowCount').textContent = '0 записей';
        return;
      }

      document.getElementById('rowCount').textContent = `${rows.length} записей`;

      const html = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Дата</th>
              <th>Event Type</th>
              <th>Тело запроса (JSON)</th>
              <th>HTTP Статус</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r, i) => `
              <tr>
                <td style="color:var(--text-muted); font-size:12px;">${rows.length - i}</td>
                <td class="td-date">${formatDate(r.created_at)}</td>
                <td class="td-type"><span class="event-tag">${r.event_type || '—'}</span></td>
                <td class="td-body">${prettyJson(r.request_body)}</td>
                <td class="td-status">${statusBadge(r.response_status)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;

      document.getElementById('logContent').innerHTML = html;
    } catch (e) {
      document.getElementById('logContent').innerHTML =
        `<div class="empty-log"><div class="icon">❌</div>Ошибка загрузки: ${e.message}</div>`;
    }
  }

  loadLog();

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light-theme');
    localStorage.setItem('db_theme', isLight ? 'light' : 'dark');
    document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
  }
  document.getElementById('themeToggle').textContent =
    document.body.classList.contains('light-theme') ? '🌙' : '☀️';
</script>
</body>
</html>
