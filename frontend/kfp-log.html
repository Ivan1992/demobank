<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KFP Event Log — DemoBank</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { background: var(--bg); padding: 32px 24px; }

    .page-header {
      max-width: 1500px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .page-header p { color: var(--text-muted); font-size: 14px; margin-top: 2px; }

    .log-card {
      max-width: 1500px;
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .log-table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--sidebar-bg);
      color: rgba(255,255,255,0.55);
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,168,142,0.05); }
    td { padding: 10px 14px; vertical-align: top; color: var(--text); }

    .td-date { white-space: nowrap; color: var(--text-muted); font-size: 12px; min-width: 140px; }
    .td-url {
      max-width: 340px;
      word-break: break-all;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--accent);
    }
    .td-body  { max-width: 260px; }
    .td-rules { max-width: 240px; }
    .td-level { text-align: center; }

    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      color: rgba(255,255,255,0.7);
      max-height: 120px;
      overflow-y: auto;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-green  { background: rgba(0,168,142,0.2);  color: #3de8ca; }
    .badge-yellow { background: rgba(255,190,100,0.2); color: #ffbe64; }
    .badge-red    { background: rgba(255,51,85,0.2);  color: #ff6680; }
    .badge-null   { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }

    .empty-log {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-log .icon { font-size: 40px; margin-bottom: 12px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .row-count { font-size: 13px; color: var(--text-muted); margin-left: auto; }

    .phase-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(0,168,142,0.15);
      color: var(--accent);
      margin-bottom: 4px;
    }
  </style>
  <style>
    /* Light theme overrides for inline styles */
    body.light-theme .code-block { color: rgba(29,54,83,0.8); background: #f4f7fa; }
    body.light-theme .td-url { color: var(--primary); }
    body.light-theme tbody tr:hover { background: rgba(0,168,142,0.04); }
    body.light-theme .badge-green  { background: rgba(0,168,142,0.12); color: #007a69; }
    body.light-theme .badge-yellow { background: rgba(180,120,0,0.12);  color: #8a6000; }
    body.light-theme .badge-red    { background: rgba(255,51,85,0.10);  color: #cc1f3f; }
    body.light-theme .badge-null   { background: rgba(29,54,83,0.08);   color: rgba(29,54,83,0.5); }
    body.light-theme .phase-tag    { background: rgba(0,168,142,0.1); color: #007a69; }
  </style>
</head>
<body>
<script>if(localStorage.getItem('db_theme')==='light')document.body.classList.add('light-theme');</script>

<div class="page-header">
  <div>
    <h1>KFP Event Log</h1>
    <p>Журнал запросов к Kaspersky Fraud Prevention</p>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn btn-outline" onclick="loadLog()">↺ Обновить</button>
    <button class="btn-theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>
    <a href="/dashboard.html" class="btn btn-secondary">← Dashboard</a>
  </div>
</div>

<div class="log-card">
  <div class="toolbar">
    <span style="font-size:13px; font-weight:600;">Последние 200 событий</span>
    <span class="row-count" id="rowCount"></span>
  </div>
  <div class="log-table-wrap">
    <div id="logContent">
      <div class="empty-log"><div class="icon">⏳</div>Загрузка…</div>
    </div>
  </div>
</div>

<script>
  function formatDate(dt) {
    if (!dt) return '—';
    const d = new Date(dt.replace(' ', 'T') + 'Z');
    return d.toLocaleString('ru-RU', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  function levelBadge(level) {
    if (!level) return '<span class="badge badge-null">—</span>';
    const cls = { green: 'badge-green', yellow: 'badge-yellow', red: 'badge-red' }[level] || 'badge-null';
    return `<span class="badge ${cls}">${level}</span>`;
  }

  function phaseFromUrl(url) {
    try {
      const p = new URL(url).searchParams.get('phase');
      return p ? `<span class="phase-tag">${p}</span><br>` : '';
    } catch { return ''; }
  }

  function prettyJson(raw) {
    if (!raw) return '<span style="color:var(--text-muted)">—</span>';
    try {
      return `<div class="code-block">${JSON.stringify(JSON.parse(raw), null, 2)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
    } catch {
      return `<div class="code-block">${raw.replace(/&/g, '&amp;').replace(/</g, '&lt;')}</div>`;
    }
  }

  async function loadLog() {
    document.getElementById('logContent').innerHTML =
      '<div class="empty-log"><div class="icon">⏳</div>Загрузка…</div>';
    document.getElementById('rowCount').textContent = '';

    try {
      const res = await fetch('/api/kfp-log');
      const rows = await res.json();

      if (!rows.length) {
        document.getElementById('logContent').innerHTML =
          '<div class="empty-log"><div class="icon">📭</div>Событий пока нет. Выполните вход или операцию.</div>';
        document.getElementById('rowCount').textContent = '0 записей';
        return;
      }

      document.getElementById('rowCount').textContent = `${rows.length} записей`;

      const html = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Дата</th>
              <th>HTTP POST запрос</th>
              <th>Тело запроса (JSON)</th>
              <th>Уровень риска</th>
              <th>Rule Versions</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r, i) => `
              <tr>
                <td style="color:var(--text-muted); font-size:12px;">${rows.length - i}</td>
                <td class="td-date">${formatDate(r.created_at)}</td>
                <td class="td-url">${phaseFromUrl(r.request_url)}${
                  r.request_url
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                }</td>
                <td class="td-body">${prettyJson(r.request_body)}</td>
                <td class="td-level">${levelBadge(r.response_level)}</td>
                <td class="td-rules">${prettyJson(r.response_rule_versions)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;

      document.getElementById('logContent').innerHTML = html;
    } catch (e) {
      document.getElementById('logContent').innerHTML =
        `<div class="empty-log"><div class="icon">❌</div>Ошибка загрузки: ${e.message}</div>`;
    }
  }

  loadLog();

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light-theme');
    localStorage.setItem('db_theme', isLight ? 'light' : 'dark');
    document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
  }
  document.getElementById('themeToggle').textContent =
    document.body.classList.contains('light-theme') ? '🌙' : '☀️';
</script>
</body>
</html>
